# Trivy configuration — single source of truth for CI and local scans.
# See: https://aquasecurity.github.io/trivy/latest/docs/configuration/

severity:
  - CRITICAL
  - HIGH

exit-code: 1

format: table

skip-dirs:
  - .venv
  - node_modules
  - .git
  - .mypy_cache
  - .ruff_cache
  - .pytest_cache

# Add CVE IDs to ignored-cves when triaged as false positives or accepted risk.
# Example: ignored-cves: [CVE-2025-12345]
ignored-cves:
  - CVE-2025-7458   # libsqlite3-0: Debian bookworm, no fix available yet
  - CVE-2023-45853  # zlib1g: Debian bookworm, marked will_not_fix
  - CVE-2025-68121  # ollama Go stdlib TLS: fixed in Go 1.24.13+, needs ollama rebuild
