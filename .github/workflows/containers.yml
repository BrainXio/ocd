name: Containers

on:
  push:
    branches: [main]
    paths:
      - "containers/**"
      - ".hadolint.yaml"
      - "src/ocd/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - ".claude/**"
      - ".github/workflows/containers.yml"
    tags: ["v*"]
  pull_request:
    paths:
      - "containers/**"
      - ".hadolint.yaml"
      - "src/ocd/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - ".claude/**"
      - ".github/workflows/containers.yml"
  workflow_dispatch:

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hadolint
        run: |
          HADOLINT_VERSION="2.14.0"
          URL="https://github.com/hadolint/hadolint/releases/download"
          URL="${URL}/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          curl -sL "$URL" | sudo install -m 755 /dev/stdin /usr/local/bin/hadolint
      - name: Run hadolint
        run: hadolint containers/*/Dockerfile

  build-base:
    needs: [lint-dockerfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ocd-base
        run: docker build -t ocd-base:latest containers/ocd-base/
      - name: Smoke test
        run: |
          docker run --rm ocd-base:latest uv --version
          docker run --rm ocd-base:latest git --version
          docker run --rm ocd-base:latest shellcheck --version
          docker run --rm ocd-base:latest whoami | grep -q ocd

  build-python:
    needs: [lint-dockerfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ocd-base
        run: docker build -t ocd-base:latest containers/ocd-base/
      - name: Build ocd-python
        run: docker build --build-arg BASE_TAG=latest -t ocd-python:latest containers/ocd-python/
      - name: Smoke test
        run: |
          docker run --rm ocd-python:latest python3 --version
          docker run --rm ocd-python:latest ruff --version
          docker run --rm ocd-python:latest mypy --version
          docker run --rm ocd-python:latest mdformat --version
          docker run --rm ocd-python:latest whoami | grep -q ocd

  build-node:
    needs: [lint-dockerfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ocd-base
        run: docker build -t ocd-base:latest containers/ocd-base/
      - name: Build ocd-node
        run: docker build --build-arg BASE_TAG=latest -t ocd-node:latest containers/ocd-node/
      - name: Smoke test
        run: |
          docker run --rm ocd-node:latest node --version
          docker run --rm ocd-node:latest pnpm --version
          docker run --rm ocd-node:latest prettier --version
          docker run --rm ocd-node:latest whoami | grep -q ocd

  build-ollama:
    needs: [lint-dockerfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ocd-base
        run: docker build -t ocd-base:latest containers/ocd-base/
      - name: Build ocd-ollama
        run: docker build --build-arg BASE_TAG=latest -t ocd-ollama:latest containers/ocd-ollama/
      - name: Smoke test
        run: |
          docker run -d --name ollama-test ocd-ollama:latest
          sleep 3
          docker exec ollama-test ollama --version
          docker rm -f ollama-test

  build-ocd:
    needs: [lint-dockerfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ocd-base
        run: docker build -t ocd-base:latest containers/ocd-base/
      - name: Build ocd-python
        run: docker build --build-arg BASE_TAG=latest -t ocd-python:latest containers/ocd-python/
      - name: Build ocd
        run: >
          docker build
          --build-arg BASE_TAG=latest
          -t ocd:latest
          -f containers/ocd/Dockerfile
          .
      - name: Smoke test
        run: |
          docker run --rm --entrypoint="" ocd:latest python3 --version
          docker run --rm --entrypoint="" ocd:latest node --version
          docker run --rm --entrypoint="" ocd:latest ruff --version
          docker run --rm --entrypoint="" ocd:latest claude --version
          docker run --rm --entrypoint="" ocd:latest ollama --version
          docker run --rm --entrypoint="" ocd:latest whoami | grep -q ocd
          docker run --rm --entrypoint="" ocd:latest which ocd
          docker run --rm --entrypoint="" ocd:latest ls /home/ocd/.claude/
          docker run --rm --entrypoint="" ocd:latest ls /opt/ocd/templates/

  publish-latest:
    needs: [build-base, build-python, build-node, build-ollama, build-ocd]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-base
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-base
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-base:latest
      - name: Build and push ocd-python
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-python
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-python:latest
      - name: Build and push ocd-node
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-node
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-node:latest
      - name: Build and push ocd-ollama
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-ollama
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-ollama:latest
      - name: Build and push ocd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/ocd/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-python
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd:latest

  publish-release:
    needs: [build-base, build-python, build-node, build-ollama, build-ocd]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-base
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-base
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-base:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-base:latest
      - name: Build and push ocd-python
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-python
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-python:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-python:latest
      - name: Build and push ocd-node
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-node
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-node:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-node:latest
      - name: Build and push ocd-ollama
        uses: docker/build-push-action@v6
        with:
          context: containers/ocd-ollama
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-ollama:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-ollama:latest
      - name: Build and push ocd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/ocd/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-python
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd:latest
