name: Containers

on:
  push:
    branches: [main]
    paths:
      - "containers/**"
      - ".hadolint.yaml"
      - "trivy.yaml"
      - "src/ocd/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - ".claude/**"
      - ".github/workflows/containers.yml"
    tags: ["v*"]
  pull_request:
    paths:
      - "containers/**"
      - ".hadolint.yaml"
      - "trivy.yaml"
      - "src/ocd/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - ".claude/**"
      - ".github/workflows/containers.yml"
  workflow_dispatch:

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install hadolint
        run: |
          HADOLINT_VERSION="2.14.0"
          URL="https://github.com/hadolint/hadolint/releases/download"
          URL="${URL}/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          curl -sL "$URL" | sudo install -m 755 /dev/stdin /usr/local/bin/hadolint
      - name: Run hadolint
        run: hadolint containers/*/Dockerfile

  build-base:
    needs: [lint-dockerfile]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-base
        id: meta
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-base
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-base:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-base:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-base:cache,mode=max
      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/brainxio/ocd-base:sha-${{ github.sha }}
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-base:sha-${{ github.sha }} uv --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-base:sha-${{ github.sha }} git --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-base:sha-${{ github.sha }} shellcheck --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-base:sha-${{ github.sha }} whoami | grep -q ocd

  build-python:
    needs: [build-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-python
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-python
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-python:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-python:cache,mode=max
      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }}
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }} python3 --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }} ruff --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }} mypy --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }} mdformat --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-python:sha-${{ github.sha }} whoami | grep -q ocd

  build-node:
    needs: [build-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-node
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-node
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-node:sha-${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-node:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-node:cache,mode=max
      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/brainxio/ocd-node:sha-${{ github.sha }}
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-node:sha-${{ github.sha }} node --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-node:sha-${{ github.sha }} pnpm --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-node:sha-${{ github.sha }} prettier --version
          docker run --rm ${{ env.REGISTRY }}/brainxio/ocd-node:sha-${{ github.sha }} whoami | grep -q ocd

  build-ollama:
    needs: [build-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-ollama
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-ollama
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-ollama:sha-${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-ollama:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-ollama:cache,mode=max
      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/brainxio/ocd-ollama:sha-${{ github.sha }}
          docker run -d --name ollama-test ${{ env.REGISTRY }}/brainxio/ocd-ollama:sha-${{ github.sha }}
          sleep 3
          docker exec ollama-test ollama --version
          docker rm -f ollama-test

  build-ocd:
    needs: [build-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd
        uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/ocd/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-python
            BASE_TAG=sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd:cache,mode=max
      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }}
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} python3 --version
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} node --version
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} ruff --version
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} claude --version
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} ollama --version
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} whoami | grep -q ocd
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} which ocd
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} ls /home/ocd/.claude/
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }} ls /opt/ocd/templates/

  # ── Stage 3: Security scan ─────────────────────────────────────────────
  scan-images:
    needs: [build-base, build-python, build-ocd]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install trivy
        run: |
          TRIVY_VERSION="0.70.0"
          URL="https://github.com/aquasecurity/trivy/releases/download"
          URL="${URL}/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sL "$URL" | sudo tar xz -C /usr/local/bin trivy
      - name: Pull ocd image
        run: docker pull ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }}
      - name: Scan ocd image
        run: >
          trivy image --config trivy.yaml --severity CRITICAL --exit-code 1
          ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }}
      - name: Scan ocd image (SARIF)
        if: github.event_name == 'push'
        run: >
          trivy image --config trivy.yaml --exit-code 0 --format sarif
          --output trivy-results.sarif
          ${{ env.REGISTRY }}/brainxio/ocd:sha-${{ github.sha }}
      - name: Upload SARIF
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ── Stage 4: Publish ────────────────────────────────────────────────────
  publish-latest:
    needs: [scan-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-base
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-base
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-base:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-base:cache
      - name: Build and push ocd-python
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-python
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-python:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-python:cache
      - name: Build and push ocd-node
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-node
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-node:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-node:cache
      - name: Build and push ocd-ollama
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-ollama
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd-ollama:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-ollama:cache
      - name: Build and push ocd
        uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/ocd/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-python
            BASE_TAG=latest
          push: true
          tags: ${{ env.REGISTRY }}/brainxio/ocd:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd:cache

  publish-release:
    needs: [scan-images]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ocd-base
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-base
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-base:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-base:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-base:cache
      - name: Build and push ocd-python
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-python
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-python:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-python:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-python:cache
      - name: Build and push ocd-node
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-node
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-node:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-node:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-node:cache
      - name: Build and push ocd-ollama
        uses: docker/build-push-action@v7
        with:
          context: containers/ocd-ollama
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-base
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd-ollama:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd-ollama:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd-ollama:cache
      - name: Build and push ocd
        uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/ocd/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/brainxio/ocd-python
            BASE_TAG=${{ steps.version.outputs.VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/brainxio/ocd:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/brainxio/ocd:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/brainxio/ocd:cache
