name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - run: uv run ruff check src/

      - run: uv run ruff format --check src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run mypy src/ocd/ --strict

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run pytest --cov --cov-report=term-missing -q

  mcp-integration:
    name: MCP Server Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - run: uv sync

      - name: Verify MCP server starts and tools are registered
        run: uv run pytest tests/test_mcp_server.py -v

  build-verify:
    name: Build Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - run: uv sync

      - run: uv run python -m build

      - name: Verify wheel contains entry point
        run: |
          python3 -c "
          import zipfile, sys, glob
          wheel = sorted(glob.glob('dist/*.whl'))[-1]
          with zipfile.ZipFile(wheel) as z:
            names = z.namelist()
            if not any('ocd_mcp' in n or 'entry_points' in n for n in names):
              print('ERROR: ocd-mcp entry point not found in wheel')
              sys.exit(1)
          print('Wheel verified: ocd-mcp entry point present')
          "
