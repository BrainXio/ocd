name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Stage 1: Gate ───────────────────────────────────────────────────────
  # Fastest check — reject bad commit messages in under a second.
  # Patterns read from git_hooks/ai-patterns.txt (single source of truth)
  check-commit-messages:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject AI attribution in commit messages
        run: |
          RANGE="${{ github.event.before }}..${{ github.event.after }}"
          if [ "$RANGE" = "0000000000000000000000000000000000000000..${{ github.event.after }}" ]; then
            RANGE="${{ github.event.after }}"
          fi
          failed=0
          while IFS= read -r hash; do
            msg=$(git log -1 --format='%B' "$hash")
            while IFS= read -r line; do
              while IFS= read -r pattern; do
                if echo "$line" | grep -qiE "$pattern"; then
                  echo "::error::Commit $hash contains prohibited AI attribution: $line"
                  failed=1
                fi
              done < git_hooks/ai-patterns.txt
            done <<< "$msg"
          done < <(git rev-list "$RANGE")
          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Rejecting push: commit messages contain AI attribution."
            echo "Remove Co-Authored-By lines, 'Generated with/by/using' lines,"
            echo "or [AI] tags. Patterns: git_hooks/ai-patterns.txt"
            exit 1
          fi

  # ── Stage 2: Fast lints (parallel) ──────────────────────────────────────
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install "yamllint>=1.35"
      - name: yamllint
        run: yamllint -f parsable .github/workflows/

  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: command -v shellcheck || (sudo apt-get update && sudo apt-get install -y shellcheck)
      - name: Run shellcheck
        run: shellcheck git_hooks/commit-msg git_hooks/pre-commit git_hooks/setup-hooks.sh

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mdformat
        run: pip install "mdformat>=0.7" "mdformat-frontmatter>=2.0.10"
      - name: mdformat --check
        run: mdformat --check README.md docs/*.md .claude/skills/*/SKILL.md

  # ── Stage 3: Slow lints (only if fast checks pass) ─────────────────────
  lint-python:
    needs: [lint-shell, lint-markdown, lint-yaml]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: ruff check
        run: uv run ruff check src/ocd/ tests/
      - name: ruff format --check
        run: uv run ruff format --check src/ocd/ tests/
      - name: mypy (strict)
        run: uv run mypy src/ocd/ --strict

  # ── Stage 4: Python tests ──────────────────────────────────────────────
  test-python:
    needs: [lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -v
