name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Stage 1: Detect changes + commit gate ────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      shell: ${{ steps.filter.outputs.shell }}
      yaml: ${{ steps.filter.outputs.yaml }}
      markdown: ${{ steps.filter.outputs.markdown }}
      node: ${{ steps.filter.outputs.node }}
      sql: ${{ steps.filter.outputs.sql }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/ocd/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
            shell:
              - 'git_hooks/**'
            yaml:
              - '.github/workflows/**'
              - '.yamllint'
            markdown:
              - '**/*.md'
              - 'docs/**'
            node:
              - '**/*.css'
              - '**/*.html'
              - '**/*.json'
              - 'package.json'
              - 'package-lock.json'
            sql:
              - '**/*.sql'
            actions:
              - '.github/workflows/**'

  check-commit-messages:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject AI attribution in commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/main..HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
            if [ "$RANGE" = "0000000000000000000000000000000000000000..${{ github.event.after }}" ]; then
              RANGE="${{ github.event.after }}"
            fi
          fi
          failed=0
          while IFS= read -r hash; do
            msg=$(git log -1 --format='%B' "$hash")
            while IFS= read -r line; do
              while IFS= read -r pattern; do
                if echo "$line" | grep -qiE "$pattern"; then
                  echo "::error::Commit $hash contains prohibited AI attribution: $line"
                  failed=1
                fi
              done < git_hooks/ai-patterns.txt
            done <<< "$msg"
          done < <(git rev-list "$RANGE")
          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Rejecting push: commit messages contain AI attribution."
            echo "Remove Co-Authored-By lines, 'Generated with/by/using' lines,"
            echo "or [AI] tags. Patterns: git_hooks/ai-patterns.txt"
            exit 1
          fi

  verify-standards:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Verify standards hash
        run: uv run ocd-standards --verify

  # ── Stage 2: Fast lints (parallel, path-conditioned) ─────────────────────
  lint-yaml:
    needs: [changes]
    if: needs.changes.outputs.yaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install "yamllint>=1.35"
      - name: yamllint
        run: yamllint -f parsable .github/workflows/

  lint-shell:
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: command -v shellcheck || (sudo apt-get update && sudo apt-get install -y shellcheck)
      - name: Run shellcheck
        run: shellcheck git_hooks/commit-msg git_hooks/pre-commit git_hooks/pre-push git_hooks/setup-hooks.sh

  lint-markdown:
    needs: [changes]
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mdformat
        run: pip install "mdformat>=0.7" "mdformat-frontmatter>=2.0.10"
      - name: mdformat --check
        run: mdformat --check README.md docs/*.md .claude/skills/*/SKILL.md

  secret-scan:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          URL="https://github.com/gitleaks/gitleaks/releases/download"
          URL="${URL}/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sL "$URL" | sudo tar xz -C /usr/local/bin gitleaks
      - name: gitleaks detect
        run: gitleaks detect --source . -c .gitleaks.toml

  lint-actions:
    needs: [changes]
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.7"
          URL="https://github.com/rhysd/actionlint/releases/download"
          URL="${URL}/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sL "$URL" | sudo tar xz -C /usr/local/bin actionlint
      - name: actionlint
        run: actionlint

  lint-node:
    needs: [changes]
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: stylelint
        run: npx stylelint "**/*.css" || echo "No CSS files found — skipping"
      - name: htmlhint
        run: npx htmlhint "**/*.html" || echo "No HTML files found — skipping"
      - name: prettier --check
        run: npx prettier --check "**/*.json" "!package-lock.json"

  lint-sql:
    needs: [changes]
    if: needs.changes.outputs.sql == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install sqlfluff
        run: pip install "sqlfluff>=3.0"
      - name: sqlfluff lint
        run: sqlfluff lint .

  scan-deps:
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install trivy
        run: |
          TRIVY_VERSION="0.70.0"
          URL="https://github.com/aquasecurity/trivy/releases/download"
          URL="${URL}/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sL "$URL" | sudo tar xz -C /usr/local/bin trivy
      - name: trivy fs
        run: trivy fs --config trivy.yaml --severity CRITICAL --exit-code 1 .

  sast-scan:
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install semgrep
        run: pip install "semgrep>=1.158"
      - name: semgrep scan
        run: semgrep --config .semgrep.yml --config p/owasp-top-ten --error src/ocd/

  # ── Stage 3: Slow lints (only if Python code changed) ────────────────────
  lint-python:
    needs: [changes, sast-scan, scan-deps]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Compile content database
        run: uv run ocd-compile-db
      - name: ruff check
        run: uv run ruff check src/ocd/ tests/
      - name: ruff format --check
        run: uv run ruff format --check src/ocd/ tests/
      - name: mypy (strict)
        run: uv run mypy src/ocd/ --strict

  # ── Stage 4: Python tests ───────────────────────────────────────────────
  test-python:
    needs: [lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Compile content database
        run: uv run ocd-compile-db
      - name: Run tests
        run: uv run pytest -v
